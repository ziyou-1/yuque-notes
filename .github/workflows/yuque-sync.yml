name: 语雀笔记自动同步（极简版）
on:
  workflow_dispatch: # 支持手动触发
  schedule:
    - cron: '0 * * * *' # 每小时自动同步一次

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装语雀官方导出工具
        run: npm install -g yuque-exporter

      - name: 配置导出信息
        run: |
          cat > config.json << EOF
          {
            "token": "${{ secrets.YUQUE_TOKEN }}",
            "namespace": "whhhhhhhhh-utetq",
            "output": "./docs",
            "format": "markdown"
          }
          EOF

      - name: 导出语雀笔记
        run: yuque-exporter --config config.json

      - name: 提交到 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "auto sync yuque notes" || echo "Nothing to commit"
          git push
