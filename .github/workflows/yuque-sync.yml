name: 语雀笔记自动同步
on:
  repository_dispatch:
    types: [yuque_sync]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装同步工具
        run: npm install -g @yuque/sync

      - name: 执行语雀同步
        env:
          YUQUE_TOKEN: ${{ secrets.YUQUE_TOKEN }}
          YUQUE_NAMESPACE: dashboard
        run: |
          yuque-sync pull .
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "auto sync yuque notes"
          git push
