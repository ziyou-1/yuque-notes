name: 语雀笔记自动同步（最终版）
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 直接用 API 同步
        env:
          YUQUE_TOKEN: ${{ secrets.YUQUE_TOKEN }}
          NAMESPACE: "whhhhhhhhh-utetq"
        run: |
          cat > sync.js << 'EOF'
          const https = require('https');
          const fs = require('fs');
          const path = require('path');

          const token = process.env.YUQUE_TOKEN;
          const ns = process.env.NAMESPACE;
          const outDir = './docs';

          if (!token || !ns) {
            console.error('❌ 缺少 Token 或 Namespace');
            process.exit(1);
          }

          if (!fs.existsSync(outDir)) fs.mkdirSync(outDir, { recursive: true });

          const get = (url) => new Promise((resolve, reject) => {
            const req = https.get(url, {
              headers: { 'X-Auth-Token': token }
            }, (res) => {
              let data = '';
              res.on('data', c => data += c);
              res.on('end', () => resolve(JSON.parse(data)));
            });
            req.on('error', reject);
          });

          (async () => {
            try {
              // 1. 获取所有知识库
              const repos = await get(`https://www.yuque.com/api/v2/users/${ns}/repos`);
              if (repos.status !== 200) throw new Error('获取知识库失败');

              for (const repo of repos.data) {
                const repoPath = path.join(outDir, repo.name);
                if (!fs.existsSync(repoPath)) fs.mkdirSync(repoPath, { recursive: true });

                // 2. 获取文档列表
                const docs = await get(`https://www.yuque.com/api/v2/repos/${repo.id}/docs`);
                if (docs.status !== 200) continue;

                for (const doc of docs.data) {
                  // 3. 获取文档详情
                  const detail = await get(`https://www.yuque.com/api/v2/repos/${repo.id}/docs/${doc.id}`);
                  if (detail.status !== 200) continue;

                  const fileName = `${doc.title.replace(/[\\/:*?"<>|]/g, '_')}.md`;
                  const filePath = path.join(repoPath, fileName);
                  const content = `# ${doc.title}\n\n${detail.data.body || ''}`;

                  fs.writeFileSync(filePath, content, 'utf8');
                  console.log(`✅ 已保存: ${repo.name}/${fileName}`);
                }
              }
              console.log('🎉 同步完成');
            } catch (err) {
              console.error('❌ 错误:', err);
              process.exit(1);
            }
          })();
          EOF

          node sync.js

      - name: 提交到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "auto sync yuque notes" || echo "Nothing to commit"
          git push
