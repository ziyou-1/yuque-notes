name: 语雀笔记自动同步
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装同步工具 elog
        run: npm install -g @elog/cli

      - name: 写入 elog 配置文件
        run: |
          cat > elog.config.js << 'EOF'
          module.exports = {
            platform: "yuque",
            yuque: {
              token: process.env.YUQUE_TOKEN,
              namespace: "whhhhhhhhh-utetq",
              onlyPublished: true
            },
            output: {
              path: "./docs",
              format: "md"
            }
          };
          EOF

      - name: 执行同步
        env:
          YUQUE_TOKEN: ${{ secrets.YUQUE_TOKEN }}
        run: |
          elog sync
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "auto sync yuque notes" || echo "Nothing to commit"
          git push
